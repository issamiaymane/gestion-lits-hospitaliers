server:
  port: 8085

spring:
  application:
    name: dashboard-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

services:
  bed-management-service:
    url: http://bed-management-service:8081
  patient-flow-service:
    url: http://patient-flow-service:8082
  capacity-prediction-service:
    url: http://capacity-prediction-service:8083
  notification-ops-service:
    url: http://notification-ops-service:8084

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
